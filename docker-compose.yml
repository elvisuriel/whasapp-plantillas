version: '3.8'
services:
  backend:
    build: ./backend
    container_name: whatsapp-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/whatsapp
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    volumes:
      - wwebjs_auth:/app/.wwebjs_auth   # Persiste la sesión de WhatsApp
    shm_size: '256mb'                   # Necesario para Chromium/Puppeteer

  postgres:
    image: postgres:16-alpine
    container_name: whatsapp-db
    restart: always
    environment:
      POSTGRES_DB: whatsapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: whatsapp-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:
  wwebjs_auth:
